<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pobieranie Listy Zakupów...</title>
    <script>
        // Automatyczne przekierowanie do Google Play po 1 sekundzie
        setTimeout(function() {
            window.location.replace("https://play.google.com/store/apps/details?id=lukasz.dynkwald.listazakopow");
        }, 1000);
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #01875f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Styl dla zapasowego przycisku */
        .btn { display: inline-block; background-color: #01875f; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <h2>Moja Lista Zakupów</h2>
    <div class="loader"></div>
    <p>Otwieranie aplikacji lub przekierowywanie do Sklepu Play...</p>
    
    <a href="https://play.google.com/store/apps/details?id=lukasz.dynkwald.listazakopow" class="btn">Pobierz aplikację ze sklepu</a>
</body>
</html>
